name: Build sing-box SRS

on:
  push:
    paths:
      - "domains/proxy.txt"
      - ".github/workflows/build-srs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate sing-box source JSON
        run: |
          mkdir -p rules
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          src = Path("domains/proxy.txt")
          out = Path("rules/proxy.source.json")

          if not src.exists():
              raise SystemExit("ERROR: domains/proxy.txt not found")

          domains = []
          seen = set()

          for raw in src.read_text(encoding="utf-8").splitlines():
              line = raw.strip()

              if not line:
                  continue

              if line.startswith("#"):
                  continue

              if " #" in line:
                  line = line.split(" #", 1)[0].strip()

              for prefix in ("domain:", "keyword:", "regex:"):
                  if line.startswith(prefix):
                      line = line[len(prefix):].strip()

              if line.startswith("*."):
                  line = line[2:]

              line = line.lower()

              if not re.fullmatch(r"[a-z0-9.-]+\.[a-z0-9-]+", line):
                  print(f"Skip invalid line: {raw}")
                  continue

              if line not in seen:
                  seen.add(line)
                  domains.append(line)

          rule_set = {
              "version": 3,
              "rules": [
                  {
                      "domain_suffix": domains
                  }
              ]
          }

          out.write_text(
              json.dumps(rule_set, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8"
          )

          print(f"Generated {out} with {len(domains)} domains")
          PY

      - name: Download pinned sing-box
        env:
          GH_TOKEN: ${{ github.token }}
          SING_BOX_VERSION: v1.12.17
        run: |
          mkdir -p /tmp/sing-box

          gh release download "$SING_BOX_VERSION" \
            --repo SagerNet/sing-box \
            --pattern "sing-box-*-linux-amd64.tar.gz" \
            --dir /tmp/sing-box

          ARCHIVE="$(find /tmp/sing-box -maxdepth 1 -type f -name 'sing-box-*-linux-amd64.tar.gz' | head -n 1)"
          echo "Archive: $ARCHIVE"

          tar -xzf "$ARCHIVE" -C /tmp/sing-box

          SING_BOX="$(find /tmp/sing-box -type f -name sing-box | head -n 1)"
          chmod +x "$SING_BOX"
          echo "SING_BOX=$SING_BOX" >> "$GITHUB_ENV"

          "$SING_BOX" version

      - name: Compile SRS
        run: |
          "$SING_BOX" rule-set compile \
            --output rules/proxy.srs \
            rules/proxy.source.json

          ls -lh rules/

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add rules/proxy.source.json rules/proxy.srs

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Build sing-box SRS rule-set"
          git push
